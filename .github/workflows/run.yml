name: resign

on:
  workflow_dispatch:
    inputs:
      ZIP_URL:    
        description: 'URL of (splloader)+uboot+sml+trustos+(teecfg)+vbmeta+boot+(recovery) (all end with .bin)'
        required: true
        default: ''
      EXTRA_KEY_TREE_URL:
        description: 'EXTRA_KEY_TREE_URL (leave blank if you only use unisoc keys)'
        required: false
      EXTRA_KEY_BRANCH:
        description: 'EXTRA_KEY_BRANCH (leave blank if you only use unisoc keys)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:runner-20.04
    steps:
    
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        ref: a9_boot_with_recovery_cpio
        path: main

    - name: Setup SSH
      if: ${{ startsWith(github.event.inputs.EXTRA_KEY_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Clone extra keys
      if: inputs.EXTRA_KEY_TREE_URL != '' && inputs.EXTRA_KEY_BRANCH != ''
      run: |
        git clone ${{ github.event.inputs.EXTRA_KEY_TREE_URL }} -b ${{ github.event.inputs.EXTRA_KEY_BRANCH }} ./extra_key

    - name: Patch & Sign
      run: |
        sudo apt update
        sudo apt -y install build-essential python2 python2-dev openssl curl wget busybox
        wget https://bootstrap.pypa.io/pip/2.7/get-pip.py
        sudo python2 get-pip.py
        pip2 install pycryptodome

        # 下载固件
        curl -fo original.zip -L "${{ github.event.inputs.ZIP_URL }}"

        # 下载 avbtool
        curl -fo avbtool.tgz -L "https://android.googlesource.com/platform/external/avb/+archive/refs/heads/pie-release.tar.gz"

        # ==========================================
        # 🔥 强制使用你仓库里的 Magisk-v26.4.apk
        # ==========================================
        cp -v main/Magisk-v26.4.apk magisk.apk

        # 下载 magiskboot
        wget -O magiskboot https://raw.githubusercontent.com/magojohnji/magiskboot-linux/main/x86_64/magiskboot
        chmod +x magiskboot

        # 运行脚本
        chmod +x main/*.sh
        mv main/sign.sh ./
        ./sign.sh

    - name: Upload
      uses: softprops/action-gh-release@v1
      with:
        files: resigned.zip
        name: ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
