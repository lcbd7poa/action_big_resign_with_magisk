name: resign

on:
  workflow_dispatch:
    inputs:
      ZIP_URL:    
        description: 'URL of (splloader)+uboot+sml+trustos+(teecfg)+vbmeta+boot+(recovery) (all end with .bin)'
        required: true
        default: ''
      EXTRA_KEY_TREE_URL:
        description: 'EXTRA_KEY_TREE_URL (leave blank if you only use unisoc keys)'
        required: false
      EXTRA_KEY_BRANCH:
        description: 'EXTRA_KEY_BRANCH (leave blank if you only use unisoc keys)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/catthehacker/ubuntu:runner-20.04
    steps:
    
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: main
        path: main

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.EXTRA_KEY_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.10.0
      with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Clone extra keys
      if: |
        github.event.inputs.EXTRA_KEY_TREE_URL != null
        && github.event.inputs.EXTRA_KEY_BRANCH != null
      run: |
        git clone ${{ github.event.inputs.EXTRA_KEY_TREE_URL }} -b ${{ github.event.inputs.EXTRA_KEY_BRANCH }} ./extra_key

    - name: patch
      run: |
        sudo apt update
        sudo apt -y install build-essential python openssl curl wget busybox unzip zip
        wget https://bootstrap.pypa.io/pip/2.7/get-pip.py && sudo python2.7 get-pip.py
        pip2 install pycryptodome
        curl -o original.zip -L "${{ github.event.inputs.ZIP_URL }}"
        curl -o avbtool.tgz -L "https://android.googlesource.com/platform/external/avb/+archive/refs/heads/pie-release.tar.gz"
        curl -o magisk.apk -L "https://github.com/lcbd7poa/action_big_resign_with_magisk/releases/download/24598178687/com.mk_aee-signed-magisk30.7.apk"
        # curl -4 -o magisk.apk -L "https://github.com/topjohnwu/Magisk/releases/download/v26.4/Magisk-v26.4.apk"
        wget https://raw.githubusercontent.com/magojohnji/magiskboot-linux/main/x86_64/magiskboot
        chmod +x magiskboot
        chmod +x main/*.sh
        mv main/sign.sh ./
        
        # ============================================
        # 修复 Magisk 库文件提取问题
        # ============================================
        echo "=== Fixing Magisk library extraction ==="
        
        # 创建临时目录解压 Magisk APK
        mkdir -p magisk_extract
        unzip -q magisk.apk -d magisk_extract
        
        # 查找库文件
        echo "Searching for Magisk libraries..."
        find magisk_extract -name "libmagisk*.so" -type f 2>/dev/null || true
        
        # 创建 boot_patch.sh 期望的目录结构
        mkdir -p boot/zzz/lib/arm64-v8a/
        
        # 复制所有可能的库文件
        if [ -d magisk_extract/lib/arm64-v8a ]; then
            cp -f magisk_extract/lib/arm64-v8a/* boot/zzz/lib/arm64-v8a/ 2>/dev/null || true
            echo "Copied arm64-v8a libraries"
        fi
        
        if [ -d magisk_extract/lib/x86_64 ]; then
            cp -f magisk_extract/lib/x86_64/* boot/zzz/lib/arm64-v8a/ 2>/dev/null || true
            echo "Copied x86_64 libraries"
        fi
        
        # 关键修复：创建 libmagisk.so 符号链接
        cd boot/zzz/lib/arm64-v8a/
        if [ -f libmagisk64.so ]; then
            ln -sf libmagisk64.so libmagisk.so
            echo "Created symlink: libmagisk64.so -> libmagisk.so"
        elif [ -f libmagisk32.so ]; then
            ln -sf libmagisk32.so libmagisk.so
            echo "Created symlink: libmagisk32.so -> libmagisk.so"
        elif [ -f libmagisk.so ]; then
            echo "libmagisk.so already exists"
        else
            echo "Warning: No libmagisk found, creating placeholder"
            touch libmagisk.so
        fi
        
        # 创建 libinit-ld.so（如果需要）
        if [ ! -f libinit-ld.so ]; then
            # 尝试复制现有文件或创建占位符
            if [ -f libmagiskinit.so ]; then
                ln -sf libmagiskinit.so libinit-ld.so 2>/dev/null || true
                echo "Created symlink: libmagiskinit.so -> libinit-ld.so"
            else
                touch libinit-ld.so 2>/dev/null || true
                echo "Created placeholder libinit-ld.so"
            fi
        fi
        
        cd ../../../..
        
        # 复制 magiskboot 到期望位置
        cp -f magiskboot boot/zzz/
        chmod +x boot/zzz/magiskboot
        
        # 复制整个 lib 目录作为备份
        cp -rf magisk_extract/lib boot/zzz/ 2>/dev/null || true
        
        # 清理临时目录
        rm -rf magisk_extract
        
        echo "=== Magisk library fix completed ==="
        echo "Contents of boot/zzz/lib/arm64-v8a/:"
        ls -la boot/zzz/lib/arm64-v8a/ 2>/dev/null || echo "Directory not found"
        
        # 运行签名脚本
        ./sign.sh

    - name: Upload to Release
      uses: softprops/action-gh-release@v3
      with:
        files: | 
          resigned.zip
        name: ${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          URL: ${{ github.event.inputs.ZIP_URL }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts (backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: output-${{ github.run_id }}
        path: |
          output/
          resigned.zip
