name: FactoryResign
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/catthehacker/ubuntu:runner-20.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl python2 python2-dev
          wget https://bootstrap.pypa.io/pip/2.7/get-pip.py
          sudo python2 get-pip.py
          pip2 install pycryptodome

      - name: 下载工具
        run: |
          curl -fo avb.tar.gz https://android.googlesource.com/platform/external/avb/+archive/refs/heads/pie-release.tar.gz
          wget -O magiskboot https://raw.githubusercontent.com/magojohnji/magiskboot-linux/main/x86_64/magiskboot
          chmod +x magiskboot

      - name: 开始签名
        run: |
          chmod +x sign.sh
          ./sign.sh

      - name: 上传结果
        uses: softprops/action-gh-release@v1
        with:
          files: resigned.zip
          tag_name: ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
