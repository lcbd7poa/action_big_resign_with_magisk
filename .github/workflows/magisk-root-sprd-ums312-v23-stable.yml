name: Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libssl-dev \
            liblz4-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            gcc-multilib \
            clang \
            lld \
            git

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Spreadtrum signing tools
        run: |
          mkdir -p work
          git clone https://github.com/TomKing062/vendor_sprd_proprietories-source_packimage.git
          
          cp -a vendor_sprd_proprietories-source_packimage/sign_image/config-unisoc work/
          cp vendor_sprd_proprietories-source_packimage/sign_image/v2/sign_image_v1.sh work/
          
          gcc -o work/get-raw-image vendor_sprd_proprietories-source_packimage/sign_image/get-raw-image.c -Wno-format
          
          cd vendor_sprd_proprietories-source_packimage/sign_image/v2/insertheader
          make
          cd ../sprd_sign
          make
          cd ../../../../
          
          cp vendor_sprd_proprietories-source_packimage/sign_image/v2/insertheader/imgheaderinsert work/
          cp vendor_sprd_proprietories-source_packimage/sign_image/v2/sprd_sign/sprd_sign work/

      - name: Build magiskboot
        run: |
          git clone --depth=1 https://github.com/PinNaCode/magiskboot_build.git
          cd magiskboot_build
          bash scripts/clone_submodules.sh
          
          CC=clang \
          CXX=clang++ \
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPREFER_STATIC_LINKING=ON \
            -DUSE_CCACHE=OFF \
            -DRust_COMPILER=$HOME/.cargo/bin/rustc
          
          cmake --build build -j$(nproc)
          cp build/magiskboot ../work/magiskboot
          cd ..

      - name: Upload tools
        uses: actions/upload-artifact@v4
        with:
          name: work-tools
          path: work/
