name: magisk-root-sprd-ums312-v23-stable
on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: '原厂boot.img直链'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Magisk v23修补 + SPRD签名 + 35M裁剪
      run: |
        sudo apt update
        sudo apt -y install build-essential openssl curl wget busybox
        mkdir work
        git clone https://github.com/TomKing062/vendor_sprd_proprietories-source_packimage.git
        cp -a vendor_sprd_proprietories-source_packimage/sign_image/config-unisoc work/
        cp vendor_sprd_proprietories-source_packimage/sign_image/v2/sign_image_v1.sh work/
        gcc -o work/get-raw-image vendor_sprd_proprietories-source_packimage/sign_image/get-raw-image.c
        cd vendor_sprd_proprietories-source_packimage/sign_image/v2/insertheader && make
        cd ../sprd_sign && make
        cd ../../../../
        cp vendor_sprd_proprietories-source_packimage/sign_image/v2/insertheader/imgheaderinsert work/
        cp vendor_sprd_proprietories-source_packimage/sign_image/v2/sprd_sign/sprd_sign work/
        chmod +x work/*
        cd work

        # 下载原厂boot
        curl -o boot_original.img -L "${{ github.event.inputs.IMG_URL }}"

        # 锁定：UMS312/Android9唯一稳定版 Magisk v23.0 magiskboot
        wget -O magiskboot https://raw.githubusercontent.com/topjohnwu/Magisk/v23.0/scripts/magiskboot
        chmod +x magiskboot

        # 修补ROOT（v23，不破坏展讯结构）
        ./magiskboot unpack boot_original.img
        ./magiskboot patch
        ./magiskboot repack boot_original.img boot_magisk.img
        ./magiskboot cleanup

        # 转展讯原始格式 + 裁剪35M（解决0x00a2）
        mv boot_magisk.img boot.bin
        ./get-raw-image boot.bin
        truncate -s 35M boot.raw

        # SPRD官方签名
        ./sign_image_v1.sh

        # 输出最终可刷ROOT包
        cp boot-sign.bin ../magisk-root-v23-signed-boot.img
      continue-on-error: true

    - name: 上传ROOT包
      uses: softprops/action-gh-release@v1
      with:
        files: magisk-root-v23-signed-boot.img
        name: UMS312-Magisk-v23-Root-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          设备：HLTE217T / UMS312 / Android9
          Magisk版本：v23.0（稳定兼容）
          状态：已ROOT + 已SPRD签名 + 35M裁剪
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
